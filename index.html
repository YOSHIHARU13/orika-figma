<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オリカバトラー DEMO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--s1:#0f0f1e;--s2:#161626;--s3:#1e1e32;
  --b1:#252540;--b2:#333358;
  --gold:#e8b84b;--gold2:#f5d070;
  --blue:#4a90e2;--green:#27ae60;--red:#c0392b;
  --orange:#e67e22;
  --text:#dde0f0;--muted:#606080;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;}

/* ===== OVERLAYS ===== */
#trigger-overlay{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
#trigger-overlay.show{display:flex;background:rgba(0,0,0,.88);}
.trig-text{font-family:'Cinzel',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:900;color:var(--orange);text-shadow:0 0 20px var(--orange),0 0 50px rgba(230,126,34,.4);letter-spacing:.12em;animation:trigPop .5s ease;}
@keyframes trigPop{0%{transform:scale(.3);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
.trig-sub{animation:trigPop .5s ease .1s both;}
.trig-name{font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:4px;}
.trig-eff{font-size:.9rem;color:var(--text);opacity:.85;}
.trig-hint{font-size:10px;color:rgba(255,255,255,.3);margin-top:14px;}

#notif{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(232,184,75,.12);border:1px solid var(--gold);border-top:none;border-radius:0 0 8px 8px;padding:7px 18px;font-size:11px;font-weight:700;color:var(--gold);z-index:800;transition:transform .3s;white-space:nowrap;}
#notif.show{transform:translateX(-50%) translateY(0);}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,6,.85);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-ov.open{display:flex;}
.modal-box{background:var(--s1);border:1px solid var(--b2);border-radius:10px;padding:16px;max-width:380px;width:90%;max-height:72vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.9);}
.modal-ttl{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.modal-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;}
.modal-x:hover{color:var(--text);}
.grave-item{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1);}
.grave-item:last-child{border-bottom:none;}
.gc-mini{width:36px;height:48px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;}
.gc-mini.monster{border:1.5px solid rgba(74,144,226,.3);background:rgba(74,144,226,.06);}
.gc-mini.spell{border:1.5px solid rgba(142,68,173,.3);background:rgba(142,68,173,.06);}
.gc-art{font-size:15px;}.gc-tp{font-size:6px;color:var(--muted);}
.gi-name{font-size:11px;font-weight:700;margin-bottom:1px;}
.gi-stats{font-size:9px;color:var(--muted);margin-bottom:2px;}
.gi-eff{font-size:9px;color:#a0c0ff;line-height:1.4;}

#confirm-dialog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;align-items:center;justify-content:center;}
#confirm-dialog.open{display:flex;}
.confirm-box{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:18px 20px;max-width:280px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.9);}
.confirm-msg{font-size:12px;line-height:1.6;margin-bottom:14px;white-space:pre-wrap;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}
.confirm-yes{padding:6px 18px;background:var(--red);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.confirm-no{padding:6px 18px;background:transparent;color:var(--muted);border:1px solid var(--b2);border-radius:5px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

/* ===== MAIN LAYOUT ===== */
/* フィールド全体はスクロール可能なページとして設計 */
#page{width:100%;max-width:680px;margin:0 auto;padding:8px 8px 0;}

/* ===== PLAYER HEADER ===== */
.p-header{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--s1);border-radius:8px;margin-bottom:6px;}
.p-avatar{width:24px;height:24px;border-radius:50%;border:2px solid var(--b2);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.p-name{font-size:11px;font-weight:700;}
.p-en-block{display:flex;align-items:center;gap:3px;margin-left:6px;padding:2px 6px;background:rgba(232,184,75,.07);border:1px solid rgba(232,184,75,.18);border-radius:6px;}
.p-en-lbl{font-size:9px;color:var(--muted);}
.en-gems{display:flex;gap:2px;}
.en-gem{width:8px;height:8px;border-radius:50%;}
.en-gem.on{background:var(--gold);box-shadow:0 0 4px rgba(232,184,75,.6);}
.en-gem.off{background:transparent;border:1.5px solid rgba(232,184,75,.2);}
.p-en-num{font-size:11px;font-weight:900;color:var(--gold);}
.p-right{margin-left:auto;display:flex;gap:5px;align-items:center;}
.deck-info{font-size:9px;color:var(--muted);}
.deck-btn{padding:2px 7px;border:1px solid var(--b2);border-radius:4px;background:transparent;color:var(--muted);font-size:9px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;}
.deck-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ===== HAND BACK ===== */
.hand-back-row{display:flex;gap:3px;padding:0 10px;margin-bottom:5px;align-items:center;}
.hbl{font-size:9px;color:var(--muted);width:32px;flex-shrink:0;}
.hb{width:24px;height:32px;border-radius:3px;border:1px solid var(--b2);background:linear-gradient(135deg,#151528,#0c0c1e);}
.hb-cnt{font-size:9px;color:var(--muted);margin-left:3px;}

/* ===== SHIELD ROW ===== */
.shield-row{display:flex;gap:5px;padding:0 10px;margin-bottom:5px;align-items:center;}
.sh-lbl{font-size:9px;color:var(--muted);width:32px;flex-shrink:0;}
.shield{width:42px;height:32px;border-radius:5px;border:2px solid var(--blue);background:rgba(74,144,226,.07);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s;position:relative;}
.shield::before{content:'🛡';}
.shield.broken{border-color:rgba(90,90,128,.2);background:rgba(90,90,128,.03);opacity:.2;}
.shield.broken::before{content:'';}
.shield.breaking{animation:shBreak .5s ease forwards;}
@keyframes shBreak{0%{transform:scale(1);}30%{transform:scale(1.2);border-color:var(--red);}60%{transform:scale(.7) rotate(8deg);opacity:.5;}100%{transform:scale(.1);opacity:0;}}
.sh-cnt{font-size:9px;color:var(--muted);margin-left:3px;}

/* ===== PARTNER ZONE ===== */
.partner-zone{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(232,184,75,.04);border:1px solid rgba(232,184,75,.15);border-radius:8px;margin:0 0 6px;position:relative;}
.partner-zone::after{content:'PARTNER';position:absolute;top:4px;right:8px;font-size:7px;font-family:'Cinzel',serif;color:rgba(232,184,75,.25);letter-spacing:.1em;}
.pz-ready{border-color:var(--gold);box-shadow:0 0 12px rgba(232,184,75,.18);animation:pzGlow 2s infinite;}
@keyframes pzGlow{0%,100%{box-shadow:0 0 8px rgba(232,184,75,.12);}50%{box-shadow:0 0 20px rgba(232,184,75,.35);}}
.pz-guardian{border-color:var(--red);animation:pzRed 1.5s infinite;}
@keyframes pzRed{0%,100%{box-shadow:0 0 8px rgba(192,57,43,.25);}50%{box-shadow:0 0 22px rgba(192,57,43,.6);}}
.guardian-badge{display:none;position:absolute;top:-9px;left:14px;background:var(--red);color:#fff;font-size:7px;font-weight:900;padding:1px 6px;border-radius:2px;white-space:nowrap;letter-spacing:.06em;}
.pz-guardian .guardian-badge{display:block;}
.p-card{width:42px;height:56px;border-radius:6px;border:2px solid var(--gold);background:linear-gradient(135deg,rgba(232,184,75,.12),rgba(232,184,75,.04));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;flex-shrink:0;position:relative;}
.p-card:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 8px 18px rgba(232,184,75,.35);}
.pc-art{font-size:15px;}
.pc-name{font-size:6px;font-weight:700;text-align:center;line-height:1.2;color:var(--gold);}
.pc-stats{font-size:6px;color:var(--muted);}
.p-info{flex:1;min-width:0;}
.pi-name{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-skill{font-size:9px;color:var(--muted);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-cond{font-size:9px;padding:2px 6px;border-radius:3px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-cond.unmet{background:rgba(90,90,128,.12);color:var(--muted);border:1px solid var(--b1);}
.pi-cond.met{background:rgba(39,174,96,.12);color:var(--green);border:1px solid rgba(39,174,96,.25);}
.btn-psum{padding:5px 9px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:5px;font-size:9px;font-weight:900;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 3px 8px rgba(232,184,75,.4);flex-shrink:0;}
.btn-psum:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(232,184,75,.6);}
.btn-psum:disabled{background:var(--s3);color:var(--muted);box-shadow:none;cursor:not-allowed;}

/* ===== MONSTER ZONE ===== */
.zone-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;padding:0 10px;margin-bottom:4px;}
.monster-row{display:flex;gap:5px;padding:0 10px;margin-bottom:6px;}
.mslot{width:calc(20% - 4px);min-width:56px;height:80px;border-radius:7px;border:1px dashed rgba(90,90,128,.2);background:rgba(255,255,255,.007);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:8px;color:rgba(90,90,128,.3);transition:all .2s;position:relative;cursor:default;padding:4px 2px;}
.mslot.filled{border:2px solid var(--b2);background:linear-gradient(160deg,rgba(26,26,48,.9),rgba(16,16,32,.9));cursor:pointer;}
.mslot.filled:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 8px 18px rgba(0,0,0,.5);z-index:10;border-color:var(--blue);}
.mslot.summon-target{border-color:var(--green);box-shadow:0 0 8px rgba(39,174,96,.4);animation:sTarget 1s infinite;cursor:pointer;}
@keyframes sTarget{0%,100%{box-shadow:0 0 5px rgba(39,174,96,.3);}50%{box-shadow:0 0 14px rgba(39,174,96,.6);}}
.mslot.atk-ready{border-color:var(--red);box-shadow:0 0 8px rgba(192,57,43,.4);animation:atkGlow 1.2s infinite;cursor:pointer;}
@keyframes atkGlow{0%,100%{box-shadow:0 0 5px rgba(192,57,43,.3);}50%{box-shadow:0 0 16px rgba(192,57,43,.6);}}
.mslot.atk-selected{border-color:var(--gold);box-shadow:0 0 12px rgba(232,184,75,.6);transform:translateY(-5px);}
.mslot.atk-target{border-color:var(--red);box-shadow:0 0 8px rgba(192,57,43,.4);animation:atkGlow .8s infinite;cursor:pointer;}
.mslot.front-guard{border-color:var(--green);box-shadow:0 0 7px rgba(39,174,96,.3);}
.mslot.summoning{animation:summonAnim .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes summonAnim{0%{transform:scale(.3) translateY(18px);opacity:0;}60%{transform:scale(1.1) translateY(-3px);}100%{transform:scale(1) translateY(0);opacity:1;}}
.mslot.dmg-shake{animation:dShake .3s ease;}
@keyframes dShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.mslot.dying{animation:dieAnim .5s ease forwards;}
@keyframes dieAnim{0%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.1) rotate(4deg);}100%{opacity:0;transform:scale(.1) rotate(12deg);}}
.m-art{font-size:18px;line-height:1;}
.m-name{font-size:7px;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.m-stats{display:flex;gap:2px;font-size:8px;font-weight:700;}
.m-atk{color:#ff8c5a;}.m-sl{color:var(--muted);}.m-hp{color:#5ae878;}
.kw-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.kw-badge{font-size:5px;padding:1px 2px;border-radius:2px;font-weight:700;}
.kw-突撃{background:rgba(255,107,53,.25);color:#ff8c5a;border:1px solid rgba(255,107,53,.4);}
.kw-前衛{background:rgba(39,174,96,.2);color:#5ae878;border:1px solid rgba(39,174,96,.4);}
.life-bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:2px;}
.lbf{height:100%;border-radius:2px;transition:width .4s ease,background .3s;}
.lbf.full{background:var(--green);}.lbf.half{background:var(--orange);}.lbf.low{background:var(--red);animation:lowP .8s infinite;}
@keyframes lowP{0%,100%{opacity:1;}50%{opacity:.4;}}
.dmg-float{position:absolute;top:0;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:var(--red);text-shadow:0 0 6px rgba(192,57,43,.6);pointer-events:none;z-index:100;animation:dmgFlt 1.2s ease forwards;}
@keyframes dmgFlt{0%{transform:translateX(-50%) translateY(0);opacity:1;}100%{transform:translateX(-50%) translateY(-26px);opacity:0;}}

/* TOOLTIP */
.tt{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(5,5,16,.99);border:1px solid var(--gold);border-radius:7px;padding:8px;width:170px;z-index:300;pointer-events:none;box-shadow:0 8px 26px rgba(0,0,0,.9);}
.mslot:hover .tt,.hcard:hover .tt{display:block;}
.tt-n{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.tt-t{font-size:8px;color:var(--muted);margin-bottom:4px;}
.tt-s{font-size:10px;margin-bottom:4px;}
.tt-a{color:#ff8c5a;}.tt-h{color:#5ae878;}.tt-c{color:var(--gold);}
.tt-div{border:none;border-top:1px solid var(--b1);margin:4px 0;}
.tt-e{font-size:9px;color:#a0c0ff;line-height:1.5;}
.tt-k{font-size:9px;color:#5ae878;margin-bottom:2px;}

/* ===== CENTER BAR ===== */
#center-bar{padding:6px 10px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.5);border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);margin-bottom:6px;}
.turn-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 6px var(--blue);flex-shrink:0;}
.turn-txt{font-size:10px;font-weight:700;color:var(--gold);white-space:nowrap;}
.phase-pips{display:flex;gap:3px;flex-shrink:0;}
.pp{padding:2px 6px;border-radius:8px;font-size:9px;font-weight:700;border:1px solid transparent;transition:all .2s;white-space:nowrap;}
.pp.main-on{background:var(--blue);color:#fff;box-shadow:0 0 7px rgba(74,144,226,.5);}
.pp.battle-on{background:var(--red);color:#fff;box-shadow:0 0 7px rgba(192,57,43,.5);}
.pp.off{background:transparent;color:var(--muted);border-color:var(--b1);}
.my-en{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.en-big{font-size:16px;font-weight:900;color:var(--gold);text-shadow:0 0 8px rgba(232,184,75,.4);}
.en-sep,.en-mx{font-size:10px;color:var(--muted);}
.en-lbl{font-size:8px;color:var(--muted);}

/* ===== HAND AREA ===== */
#hand-area{padding:6px 10px 6px;background:rgba(0,0,0,.2);border-top:1px solid var(--b1);}
.hand-hint{font-size:9px;color:var(--muted);margin-bottom:6px;text-align:center;}
#hand-row{display:flex;gap:4px;justify-content:center;overflow-x:auto;padding-bottom:2px;}
.hcard{width:56px;height:74px;border-radius:7px;border:1.5px solid var(--b2);background:linear-gradient(160deg,rgba(24,24,46,.95),rgba(14,14,30,.98));cursor:pointer;transition:all .25s cubic-bezier(.175,.885,.32,1.275);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px;padding:3px;position:relative;flex-shrink:0;}
.hcard.playable{border-color:var(--green);box-shadow:0 0 9px rgba(39,174,96,.4);animation:hcPlay 2s infinite;}
@keyframes hcPlay{0%,100%{box-shadow:0 0 6px rgba(39,174,96,.3);}50%{box-shadow:0 0 15px rgba(39,174,96,.6);}}
.hcard.selected{border-color:var(--gold);box-shadow:0 0 14px rgba(232,184,75,.6);transform:translateY(-12px) scale(1.06);z-index:20;}
.hcard:not(.selected):hover{transform:translateY(-9px) scale(1.04);border-color:var(--blue);box-shadow:0 12px 24px rgba(0,0,0,.7);z-index:15;}
.hcard.no-en{opacity:.3;cursor:not-allowed;filter:grayscale(.5);}
.hcard.no-en:hover{transform:none;box-shadow:none;}
.hcard.spell{border-color:rgba(74,144,226,.3);}
.hcard.spell.playable{border-color:var(--green);}
.hcard.has-trig::after{content:'鼓動';position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:6px;color:var(--orange);font-weight:700;}
.c-cost{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:var(--gold);color:#000;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;box-shadow:0 2px 6px rgba(232,184,75,.5);}
.c-cost.cant{background:var(--muted);box-shadow:none;}
.c-art{font-size:19px;line-height:1;margin-top:3px;}
.c-type{font-size:6px;color:var(--muted);}
.c-name{font-size:7px;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-sub{font-size:6px;color:var(--muted);}

/* ===== ACTION BAR ===== */
#action-bar{display:flex;gap:6px;align-items:center;padding:6px 10px;background:rgba(0,0,0,.5);border-top:1px solid var(--b1);flex-wrap:wrap;}
.btn{padding:6px 12px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
.btn-battle{background:linear-gradient(135deg,#a93226,var(--red));color:#fff;box-shadow:0 3px 10px rgba(192,57,43,.35);}
.btn-battle:hover{transform:translateY(-1px);}
.btn-end{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 3px 10px rgba(232,184,75,.3);}
.btn-end:hover{transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--b2);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-info{background:transparent;color:var(--muted);border:1px solid var(--b1);font-size:9px;margin-left:auto;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}

/* ===== LOG ===== */
#log-area{background:rgba(0,0,0,.5);border-top:1px solid var(--b1);}
#log-hdr{padding:3px 10px;background:var(--s2);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--b1);}
#log-body{padding:4px 10px;max-height:72px;overflow-y:auto;}
.le{font-size:9px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:4px;}
.le-i{flex-shrink:0;font-size:9px;}.le-t{flex:1;line-height:1.5;}
.le.atk .le-t{color:var(--orange);}.le.trig .le-t{color:var(--gold);font-weight:700;}
.le.ptn .le-t{color:#c77dff;font-weight:700;}.le.norm .le-t{color:var(--muted);}
.le.dmg .le-t{color:var(--red);}

/* ===== DIVIDER ===== */
.field-divider{height:1px;background:linear-gradient(90deg,transparent,var(--b2),transparent);margin:0 10px 6px;}
</style>
</head>
<body>

<!-- OVERLAYS -->
<div id="trigger-overlay" onclick="hideTrigger()">
  <div class="trig-text">TRIGGER!</div>
  <div class="trig-sub">
    <div class="trig-name" id="trig-name"></div>
    <div class="trig-eff" id="trig-eff"></div>
  </div>
  <div class="trig-hint">タップで閉じる</div>
</div>

<script>
const GS = {
  phase:'main', myTurn:true, turn:4,
  selectedCard:null, selectedAttacker:null, pendingConfirm:null,
  my:{
    en:3, enMax:4,
    hand:[
      {name:'炎の守護者',art:'🛡',type:'monster',cost:3,atk:3,hp:8,maxHp:8,kw:['前衛'],eff:'前衛'},

    ],

    ],

      {name:'炎の加護',art:'✨',type:'spell',cost:1,eff:'ATK+3（このターン）',trigger:true},
      {name:'灼熱突撃兵',art:'💨',type:'monster',cost:2,atk:3,hp:5,maxHp:5,kw:['突撃'],eff:'突撃',trigger:false},
      {name:'ファイアボール',art:'💥',type:'spell',cost:3,eff:'モンスター1体に5ダメ',trigger:false},
      {name:'炎獣ファング',art:'🔥',type:'monster',cost:3,atk:4,hp:6,maxHp:6,kw:['突撃'],eff:'突撃',trigger:false},
      {name:'烈火の斬撃',art:'⚡',type:'spell',cost:2,eff:'モンスター1体に3ダメ',trigger:true},
    ],
    grave:[
      {name:'灼熱突撃兵',art:'💨',type:'monster',cost:2,atk:3,hp:5,maxHp:5,eff:'突撃'},

    ],
    partner:{name:'紅蓮王ヴァルド',art:'🔥',cost:5,atk:8,hp:12,maxHp:12,skill:'突撃モンスターATK+1',condText:'1T中シールド2枚破壊',condMet:true,summoned:false},
    deckCount:28,

  enemy:{
    en:5,enMax:8,
    handCount:5,
    monsters:[
      {name:'水の守護者',art:'🛡',cost:3,atk:2,hp:4,maxHp:8,kw:['前衛'],eff:'前衛',canAttack:false},
      {name:'霧の精霊',art:'🌊',cost:2,atk:2,hp:5,maxHp:5,kw:[],eff:'破壊時:1ドロー',canAttack:false},
      null,null,null
    ],
    shields:[true,true,false,false,false],
    shieldCards:[
      {name:'大波',art:'🌀',type:'spell',cost:3,eff:'モンスター1体バウンス',trigger:true},
      {name:'水の守護者',art:'🛡',type:'monster',cost:3,atk:2,hp:8,maxHp:8,kw:['前衛'],eff:'前衛',trigger:false},
      null,null,null
    ],
    grave:[
      {name:'水流の踊り手',art:'💧',type:'monster',cost:1,atk:1,hp:4,maxHp:4,eff:'召喚時:1ドロー'},

function renderAll(){
  renderENBlock('enemy',GS.enemy.en,GS.enemy.enMax);
  renderENBlock('my',GS.my.en,GS.my.enMax);
  renderMyCenterEN();
  renderHandBacks();
  renderShields('enemy');
  renderShields('my');
  renderPartner('enemy');
  renderPartner('my');
  renderMonsters('enemy');
  renderMonsters('my');
  renderHand();
  renderPhase();
  updateButtons();
  document.getElementById('enemy-deck-info').textContent='デッキ '+GS.enemy.deckCount+'枚';
  document.getElementById('my-deck-info').textContent='デッキ '+GS.my.deckCount+'枚';
  document.getElementById('info-btn').textContent='デッキ '+GS.my.deckCount+'枚';
  document.getElementById('enemy-grave-btn').textContent=GS.enemy.grave.length+'枚';
  document.getElementById('my-grave-btn').textContent=GS.my.grave.length+'枚';
}

function renderENBlock(who,cur,max){
  const gems=document.getElementById(who+'-en-gems');
  const num=document.getElementById(who+'-en-num');
  if(!gems)return;
  gems.style.cssText='display:flex;gap:2px;align-items:center;';
  gems.innerHTML='';
  for(let i=0;i<Math.min(max,10);i++){
    const g=document.createElement('div');
    g.className='en-gem '+(i<cur?'on':'off');
    gems.appendChild(g);
  }
  if(num)num.textContent=cur+'/'+max;
}

function renderMyCenterEN(){
  const gems=document.getElementById('my-en-gems');
  const num=document.getElementById('my-en-num');
  const mx=document.getElementById('my-en-max');
  if(!gems)return;
  gems.style.cssText='display:flex;gap:2px;align-items:center;';
  gems.innerHTML='';
  for(let i=0;i<Math.min(GS.my.enMax,10);i++){
    const g=document.createElement('div');g.className='en-gem '+(i<GS.my.en?'on':'off');gems.appendChild(g);
  }
  if(num)num.textContent=GS.my.en;
  if(mx)mx.textContent=GS.my.enMax;
}

function renderHandBacks(){
  const hb=document.getElementById('enemy-hand-backs');
  const hc=document.getElementById('enemy-hand-cnt');
  if(!hb)return;
  hb.style.cssText='display:flex;gap:3px;align-items:center;flex-wrap:nowrap;';
  hb.innerHTML='';
  for(let i=0;i<GS.enemy.handCount;i++){const d=document.createElement('div');d.className='hb';hb.appendChild(d);}
  if(hc)hc.textContent=GS.enemy.handCount+'枚';
}

function renderShields(who){
  const row=document.getElementById(who+'-shields');
  const cnt=document.getElementById(who+'-sh-cnt');
  if(!row)return;
  row.style.cssText='display:flex;gap:5px;align-items:center;flex-wrap:nowrap;';
  const shields=GS[who].shields;
  row.innerHTML='';
  let alive=0;
  shields.forEach((s,i)=>{
    if(s)alive++;
    const el=document.createElement('div');
    el.className='shield'+(s?'':' broken');
    el.id=who+'-sh-'+i;
    row.appendChild(el);
  });
  if(cnt)cnt.textContent='残 '+alive+'枚';
}

function renderPartner(who){
  const p=GS[who].partner;
  const zone=document.getElementById(who+'-pz');
  const card=document.getElementById(who+'-pc');
  const pname=document.getElementById(who+'-pname');
  const pskill=document.getElementById(who+'-pskill');
  const pcond=document.getElementById(who+'-pcond');
  if(!zone)return;
  card.innerHTML=`<div class="pc-art">${p.art}</div><div class="pc-name">${p.name}</div><div class="pc-stats">ATK${p.atk}/LIFE${p.hp}</div>
    <div class="tt"><div class="tt-n">${p.name}</div><div class="tt-t">パートナー</div><div class="tt-s"><span class="tt-c">EN${p.cost}</span> / <span class="tt-a">ATK${p.atk}</span> / <span class="tt-h">LIFE${p.hp}</span></div><hr class="tt-div"><div class="tt-k">常在: ${p.skill}</div><div class="tt-e">召喚条件: ${p.condText}</div></div>`;
  pname.textContent=p.name;
  pskill.textContent='常在: '+p.skill;
  pcond.textContent=p.condMet?'✓ 召喚条件達成':'召喚条件: '+p.condText;
  pcond.className='pi-cond '+(p.condMet?'met':'unmet');
  zone.classList.remove('pz-ready','pz-guardian');
  const allBroken=GS[who].shields.every(s=>!s);
  if(p.summoned&&allBroken)zone.classList.add('pz-guardian');
  else if(p.condMet&&!p.summoned)zone.classList.add('pz-ready');
  if(who==='my'){
    const btn=document.getElementById('my-pbtn');
    if(p.summoned){btn.textContent='召喚済';btn.disabled=true;}
    else if(p.condMet){btn.textContent='召喚!';btn.disabled=false;}
    else{btn.textContent='召喚不可';btn.disabled=true;}
  }
}

function renderMonsters(who){
  const row=document.getElementById(who+'-monsters');
  if(!row)return;
  row.style.cssText='display:flex;gap:5px;flex-wrap:nowrap;';
  row.innerHTML='';
  GS[who].monsters.forEach((m,i)=>{
    const slot=document.createElement('div');
    if(m){
      const hp=m.hp/m.maxHp*100;
      const hpC=hp>50?'full':hp>25?'half':'low';
      const kwH=(m.kw||[]).map(k=>`<span class="kw-badge kw-${k}">${k}</span>`).join('');
      slot.className='mslot filled';
      slot.innerHTML=`<div class="m-art">${m.art}</div><div class="m-name">${m.name}</div><div class="m-stats"><span class="m-atk">${m.atk}</span><span class="m-sl">/</span><span class="m-hp">${m.hp}</span></div><div class="kw-row">${kwH}</div><div class="life-bar"><div class="lbf ${hpC}" style="width:${hp}%"></div></div><div class="tt"><div class="tt-n">${m.name}</div><div class="tt-t">モンスター</div><div class="tt-s"><span class="tt-c">EN${m.cost}</span> / <span class="tt-a">ATK${m.atk}</span> / <span class="tt-h">LIFE${m.hp}/${m.maxHp}</span></div><hr class="tt-div">${(m.kw||[]).length?`<div class="tt-k">${m.kw.join(', ')}</div>`:''}<div class="tt-e">${m.eff||''}</div></div>`;
      if(m.kw&&m.kw.includes('前衛'))slot.classList.add('front-guard');
      if(who==='my'&&GS.phase==='battle'&&m.canAttack){slot.classList.add('atk-ready');slot.onclick=()=>selectAttacker(i);}
      else if(who==='my'){slot.onclick=()=>tryPlace(i);}
    }else{
      slot.className='mslot';
      slot.textContent='空き';
      if(who==='my')slot.onclick=()=>tryPlace(i);
    }
    slot.id=who+'-m-'+i;
    row.appendChild(slot);
  });
}

function renderHand(){
  const row=document.getElementById('hand-row');
  row.style.cssText='display:flex;gap:4px;justify-content:center;overflow-x:auto;';
  row.innerHTML='';
  GS.my.hand.forEach((c,i)=>{
    const ok=c.cost<=GS.my.en;
    const sel=GS.selectedCard===i;
    const hc=document.createElement('div');
    hc.className='hcard'+(c.type==='spell'?' spell':'')+(ok?' playable':' no-en')+(sel?' selected':'')+(c.trigger?' has-trig':'');
    hc.id='hc-'+i;
    hc.innerHTML=`<div class="c-cost ${ok?'':'cant'}">${c.cost}</div><div class="c-art">${c.art}</div><div class="c-type">${c.type==='spell'?'スペル':'モンスター'}</div><div class="c-name">${c.name}</div><div class="c-sub">${c.type==='monster'?`ATK${c.atk}/${c.hp}`:''}</div><div class="tt"><div class="tt-n">${c.name}</div><div class="tt-t">${c.type==='spell'?'スペル'+(c.trigger?' / 鼓動':''):'モンスター'}</div><div class="tt-s"><span class="tt-c">EN${c.cost}</span>${c.type==='monster'?` / <span class="tt-a">ATK${c.atk}</span> / <span class="tt-h">LIFE${c.hp}</span>`:''}</div><hr class="tt-div">${c.kw&&c.kw.length?`<div class="tt-k">${c.kw.join(', ')}</div>`:''}<div class="tt-e">${c.eff||''}</div></div>`;
    if(ok)hc.onclick=()=>selectCard(i);
    row.appendChild(hc);
  });
}

function renderPhase(){
  document.getElementById('turn-txt').textContent=`T${GS.turn} — ${GS.myTurn?'自分':'相手'}のターン`;
  ['draw','main','battle','end'].forEach(p=>{
    const el=document.getElementById('pip-'+p);
    if(!el)return;
    el.className='pp off';
    if(p==='main'&&GS.phase==='main')el.classList.add('main-on');
    if(p==='battle'&&GS.phase==='battle')el.classList.add('battle-on');
  });
}

function updateButtons(){
  const canAct=GS.myTurn&&GS.phase==='main';
  const canBattle=GS.myTurn&&GS.phase==='battle';
  document.getElementById('btn-battle').disabled=!canAct;
  document.getElementById('btn-end').disabled=!(canAct||canBattle);
}

// ===== INTERACTIONS =====
function selectCard(i){
  if(!GS.myTurn||GS.phase!=='main')return;
  if(GS.selectedCard===i){clearSel();return;}
  GS.selectedCard=i;
  clearAttacker();
  clearHighlights();
  const c=GS.my.hand[i];
  if(c.type==='spell'){
    if(c.eff&&(c.eff.includes('1体')||c.eff.includes('1枚'))){
      highlightEnemyTargets();
      addLog('⚡',`${c.name} 選択 — 対象を選んでください`,'norm');
    }else{
      showConfirm(`「${c.name}」を発動しますか？\n${c.eff}`,()=>castSpell(i,-1));
    }
  }else{
    highlightMySlots();
    addLog('▶',`${c.name} 選択 — 空きスロットに召喚できます`,'norm');
  }
  renderHand();
}

function clearSel(){GS.selectedCard=null;clearHighlights();renderHand();renderMonsters('enemy');}
function clearHighlights(){
  document.querySelectorAll('.summon-target').forEach(s=>s.classList.remove('summon-target'));
  document.querySelectorAll('.atk-target').forEach(s=>{s.classList.remove('atk-target');s.onclick=null;});
  document.getElementById('enemy-section')&&(document.getElementById('enemy-section').onclick=null);
}
function highlightMySlots(){
  GS.my.monsters.forEach((m,i)=>{if(!m){const s=document.getElementById('my-m-'+i);if(s)s.classList.add('summon-target');}});
}
function highlightEnemyTargets(){
  GS.enemy.monsters.forEach((m,i)=>{
    if(m){const s=document.getElementById('enemy-m-'+i);if(s){s.classList.add('atk-target');s.onclick=()=>castSpellOn(GS.selectedCard,i);}}
  });
}

function tryPlace(slotIdx){
  if(GS.selectedCard===null)return;
  const c=GS.my.hand[GS.selectedCard];
  if(!c||c.type!=='monster'||GS.my.monsters[slotIdx]!==null)return;
  placeMonster(GS.selectedCard,slotIdx);
}

function placeMonster(hi,si){
  const c=GS.my.hand[hi];
  if(c.cost>GS.my.en){showNotif('ENが不足しています');return;}
  GS.my.en-=c.cost;
  GS.my.monsters[si]={name:c.name,art:c.art,cost:c.cost,atk:c.atk,hp:c.hp,maxHp:c.hp,kw:c.kw||[],eff:c.eff||'',canAttack:(c.kw||[]).includes('突撃')};
  GS.my.hand.splice(hi,1);
  GS.selectedCard=null;
  clearHighlights();
  renderAll();
  setTimeout(()=>{const s=document.getElementById('my-m-'+si);if(s)s.classList.add('summoning');},30);
  addLog('⚡',`${c.name} 召喚（EN${c.cost}消費）`,'norm');
  if(c.eff&&c.eff.includes('召喚時'))addLog('▶',`登場時効果: ${c.eff}`,'norm');
}

function castSpell(hi,targetIdx){
  const c=GS.my.hand[hi];
  if(!c||c.cost>GS.my.en)return;
  GS.my.en-=c.cost;
  GS.my.grave.push(c);
  GS.my.hand.splice(hi,1);
  GS.selectedCard=null;
  clearHighlights();
  addLog('✨',`${c.name} 発動（EN${c.cost}消費）→ ${c.eff}`,'norm');
  if(c.eff.includes('全体')){
    const targets=GS.enemy.monsters.filter(m=>m);
    const dmgEach=targets.length?Math.floor(4/targets.length):0;
    GS.enemy.monsters.forEach((m,i)=>{
      if(m){m.hp-=dmgEach;if(m.hp<=0)setTimeout(()=>destroyMonster('enemy',i),300);}
    });
  }
  renderAll();
}

function castSpellOn(hi,ti){
  const c=GS.my.hand[hi];
  const t=GS.enemy.monsters[ti];
  if(!c||!t||c.cost>GS.my.en)return;
  const dmg=parseInt(c.eff.match(/\d+/)?.[0]||0);
  GS.my.en-=c.cost;
  GS.my.grave.push(c);
  GS.my.hand.splice(hi,1);
  GS.selectedCard=null;
  clearHighlights();
  const slot=document.getElementById('enemy-m-'+ti);
  if(slot){slot.classList.add('dmg-shake');showDmgNum(slot,dmg);setTimeout(()=>slot.classList.remove('dmg-shake'),400);}
  t.hp-=dmg;
  addLog('✨',`${c.name} → ${t.name}に${dmg}ダメージ`,'atk');
  if(t.hp<=0)setTimeout(()=>{addLog('💀',`${t.name} 破壊`,'dmg');destroyMonster('enemy',ti);},300);
  renderAll();
}

function goBattle(){
  if(!GS.myTurn||GS.phase!=='main')return;
  GS.phase='battle';
  GS.selectedCard=null;
  clearHighlights();
  renderAll();
  addLog('⚔','バトルフェイズ開始','atk');
}

function selectAttacker(si){
  if(GS.phase!=='battle'||!GS.myTurn)return;
  const m=GS.my.monsters[si];
  if(!m||!m.canAttack)return;
  if(GS.selectedAttacker===si){clearAttacker();return;}
  GS.selectedAttacker=si;
  document.querySelectorAll('.atk-selected,.atk-target').forEach(s=>{s.classList.remove('atk-selected','atk-target');s.onclick=null;});
  const sel=document.getElementById('my-m-'+si);
  if(sel)sel.classList.add('atk-selected');
  const hasFront=GS.enemy.monsters.some(m=>m&&m.kw&&m.kw.includes('前衛'));
  GS.enemy.monsters.forEach((em,i)=>{
    if(!em)return;
    if(hasFront&&!(em.kw&&em.kw.includes('前衛')))return;
    const s=document.getElementById('enemy-m-'+i);
    if(s){s.classList.add('atk-target');s.onclick=()=>doAttack(si,i);}
  });
  if(!hasFront){
    // 相手フィールドへの直接攻撃エリアをクリックで発動
    const myPz=document.getElementById('enemy-header');
    if(myPz)myPz.onclick=(e)=>{if(!e.target.closest('.deck-btn'))doDirectAttack(si);};
  }
  addLog('⚔',`${m.name}（ATK${m.atk}）攻撃宣言`,'atk');
}

function clearAttacker(){
  GS.selectedAttacker=null;
  document.querySelectorAll('.atk-selected,.atk-target').forEach(s=>{s.classList.remove('atk-selected','atk-target');s.onclick=null;});
  const eh=document.getElementById('enemy-header');
  if(eh)eh.onclick=null;
}

function doAttack(asi,dsi){
  const atk=GS.my.monsters[asi];
  const def=GS.enemy.monsters[dsi];
  if(!atk||!def)return;
  clearAttacker();
  atk.canAttack=false;
  if(atk.eff&&atk.eff.includes('攻撃時')){
    const d=parseInt(atk.eff.match(/\d+/)?.[0]||0);
    if(d>0){breakShield('enemy');addLog('⚡',`${atk.name} 攻撃時効果: 相手に${d}ダメージ`,'atk');}
  }
  const dToE=atk.atk;const dToM=def.atk;
  def.hp-=dToE;atk.hp-=dToM;
  const as=document.getElementById('my-m-'+asi);const ds=document.getElementById('enemy-m-'+dsi);
  if(ds){ds.classList.add('dmg-shake');showDmgNum(ds,dToE);}
  if(as&&dToM>0){as.classList.add('dmg-shake');showDmgNum(as,dToM);}
  addLog('⚔',`${atk.name}(ATK${atk.atk}) vs ${def.name}(ATK${def.atk})`,'atk');
  if(def.hp<=0)setTimeout(()=>{addLog('💀',`${def.name} 破壊`,'dmg');destroyMonster('enemy',dsi);},400);
  if(atk.hp<=0)setTimeout(()=>{addLog('💀',`${atk.name} 破壊`,'dmg');destroyMonster('my',asi);},400);
  setTimeout(()=>renderAll(),120);
}

function doDirectAttack(asi){
  const atk=GS.my.monsters[asi];
  if(!atk)return;
  clearAttacker();
  const eh=document.getElementById('enemy-header');if(eh)eh.onclick=null;
  atk.canAttack=false;
  addLog('⚔',`${atk.name} 直接攻撃！シールドを破壊`,'atk');
  setTimeout(()=>{breakShield('enemy');renderAll();},200);
}

function breakShield(who){
  const shields=GS[who].shields;
  const cards=GS[who].shieldCards;
  let idx=-1;
  for(let i=shields.length-1;i>=0;i--){if(shields[i]){idx=i;break;}}
  if(idx<0)return;
  shields[idx]=false;
  const el=document.getElementById(who+'-sh-'+idx);
  if(el){el.classList.add('breaking');setTimeout(()=>{el.classList.remove('breaking');el.classList.add('broken');},500);}
  renderShields(who);
  const card=cards[idx];
  if(card){
    GS[who].grave.push(card);
    if(card.trigger){
      setTimeout(()=>showTrigger(card,who),600);
      return;
    }
    if(who==='my'){
      GS.my.hand.push(card);
      addLog('🛡',`シールド破壊 → ${card.name} 手札に加わった`,'norm');
    }else{
      GS.enemy.handCount++;
      addLog('🛡','相手のシールドが割れた','norm');
    }
  }else{
    addLog('🛡','シールドが割れた','norm');
  }
  setTimeout(()=>renderAll(),600);
}

function showTrigger(card,who){
  document.getElementById('trig-name').textContent=card.name;
  document.getElementById('trig-eff').textContent=card.eff||'';
  document.getElementById('trigger-overlay').classList.add('show');
  addLog('🔥',`TRIGGER発動: ${card.name} → ${card.eff}`,'trig');
  if(who==='my'){
    GS.my.grave.push(card);
    // 効果処理（簡易）
  }
  setTimeout(()=>hideTrigger(),2200);
}

function hideTrigger(){document.getElementById('trigger-overlay').classList.remove('show');renderAll();}

function destroyMonster(who,si){
  const m=GS[who].monsters[si];
  if(!m)return;
  const slot=document.getElementById(who+'-m-'+si);
  if(slot)slot.classList.add('dying');
  setTimeout(()=>{
    if(m.eff&&m.eff.includes('破壊時'))addLog('▶',`${m.name} 破壊時効果: ${m.eff}`,'norm');
    GS[who].grave.push(m);
    GS[who].monsters[si]=null;
    renderMonsters(who);
    renderShields(who);
  },500);
}

function endTurn(){
  if(!GS.myTurn)return;
  GS.phase='enemy';GS.myTurn=false;
  GS.selectedCard=null;GS.selectedAttacker=null;
  clearHighlights();
  document.querySelectorAll('.hcard').forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.35';});
  addLog('🔄','ターン終了 → 相手ターン','norm');
  renderPhase();updateButtons();
  setTimeout(()=>{
    addLog('👾','相手がカードを使用中...','norm');
    GS.enemy.handCount=Math.max(0,GS.enemy.handCount-1);
    setTimeout(()=>{
      GS.turn++;GS.myTurn=true;GS.phase='main';
      GS.my.enMax=Math.min(10,GS.my.enMax+1);GS.my.en=GS.my.enMax;
      GS.my.monsters.forEach(m=>{if(m)m.canAttack=true;});
      const drawn={name:'炎の精霊',art:'🔥',type:'monster',cost:1,atk:2,hp:4,maxHp:4,kw:['突撃'],eff:'突撃'};
      GS.my.hand.push(drawn);
      document.querySelectorAll('.hcard').forEach(c=>{c.style.pointerEvents='';c.style.opacity='';});
      addLog('✨',`自分のターン開始 — EN${GS.my.enMax}回復 / 1枚ドロー`,'ptn');
      renderAll();
    },1500);
  },2000);
}

function summonPartner(){
  const p=GS.my.partner;
  if(p.summoned||!p.condMet)return;
  p.summoned=true;
  const ei=GS.my.monsters.findIndex(m=>m===null);
  if(ei>=0){
    GS.my.monsters[ei]={name:p.name,art:p.art,cost:p.cost,atk:p.atk,hp:p.hp,maxHp:p.maxHp,kw:[],eff:p.skill,canAttack:true,isPartner:true};
  }
  const allBroken=GS.my.shields.every(s=>!s);
  addLog('⚡',`${p.name} 召喚！${allBroken?'→ 守護状態に移行':''}`, 'ptn');
  showNotif(`⚡ ${p.name} 召喚！`);
  renderAll();
}

function openGrave(who){
  const list=document.getElementById(who+'-grave-list');
  const cnt=document.getElementById(who+'-grave-cnt');
  const grave=GS[who].grave;
  if(cnt)cnt.textContent=`（${grave.length}枚）`;
  if(list){
    if(!grave.length){list.innerHTML='<div style="color:var(--muted);font-size:11px;padding:8px 0;">墓地にカードはありません</div>';}
    else{list.innerHTML=grave.map(c=>`<div class="grave-item"><div class="gc-mini ${c.type}"><div class="gc-art">${c.art}</div><div class="gc-tp">${c.type==='spell'?'スペル':'モンスター'}</div></div><div><div class="gi-name">${c.name}</div><div class="gi-stats">${c.type==='monster'?`EN${c.cost} / ATK${c.atk} / LIFE${c.maxHp||c.hp}`:`EN${c.cost}`}</div><div class="gi-eff">${c.eff||''}</div></div></div>`).join('');}
  }
  document.getElementById('modal-'+who+'-grave').classList.add('open');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-ov'))e.target.classList.remove('open');});

function showNotif(msg){
  const b=document.getElementById('notif');b.textContent=msg;b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),2500);
}

function showConfirm(msg,cb){
  GS.pendingConfirm=cb;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-dialog').classList.add('open');
}
function confirmYes(){document.getElementById('confirm-dialog').classList.remove('open');if(GS.pendingConfirm){GS.pendingConfirm();GS.pendingConfirm=null;}}
function confirmNo(){document.getElementById('confirm-dialog').classList.remove('open');GS.pendingConfirm=null;clearSel();}

function showDmgNum(el,dmg){
  const d=document.createElement('div');d.className='dmg-float';d.textContent='-'+dmg;
  el.style.position='relative';el.appendChild(d);
  setTimeout(()=>d.remove(),1300);
}

function addLog(icon,text,cls){
  const body=document.getElementById('log-body');
  const e=document.createElement('div');e.className='le '+cls;
  e.innerHTML=`<span class="le-i">${icon}</span><span class="le-t">${text}</span>`;
  body.appendChild(e);body.scrollTop=body.scrollHeight;
}

// INIT
addLog('▶','ターン4 — 自分のターン開始','norm');
addLog('⚔','炎獣ファング が 水の守護者 に攻撃 → 水の守護者 LIFE残4','atk');
addLog('⚡','紅蓮王ヴァルドの召喚条件達成！','ptn');
renderAll();
</script>
</body>
