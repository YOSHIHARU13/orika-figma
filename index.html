<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オリカバトラー — WF Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080f;--p1:#0d0d1a;--p2:#131324;--p3:#181828;
  --l1:#20203a;--l2:#2e2e50;--l3:#424268;
  --gold:#d4a843;--gdim:rgba(212,168,67,.13);--gbright:rgba(212,168,67,.35);
  --blue:#4a90e2;--bdim:rgba(74,144,226,.14);--bbright:rgba(74,144,226,.4);
  --green:#27ae60;--gdim2:rgba(39,174,96,.12);
  --red:#c0392b;--rdim:rgba(192,57,43,.15);
  --orange:#d4820a;
  --tx:#c4c8e0;--tx2:#7080a0;--tx3:#384060;--white:#eef0f8;
  --mono:'Roboto Mono',monospace;
}
html,body{width:1280px;height:720px;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;}

/* ==============================
   ROOT — position:absolute で四隅配置
   ============================== */
#root{position:relative;width:1280px;height:720px;overflow:hidden;background:var(--bg);}

/* フィールド背景ライン */
#root::before{
  content:'';position:absolute;
  left:220px;right:220px;
  top:0;bottom:0;
  border-left:1px solid var(--l1);
  border-right:1px solid var(--l1);
  pointer-events:none;z-index:0;
}
#root::after{
  content:'';position:absolute;
  left:220px;right:220px;
  top:50%;height:1px;
  background:linear-gradient(90deg,transparent,var(--l2) 20%,var(--l2) 80%,transparent);
  pointer-events:none;z-index:0;
}

/* ==============================
   DEMO BAR — 最上部固定
   ============================== */
#dbar{
  position:absolute;top:0;left:0;right:0;height:34px;z-index:100;
  display:flex;align-items:center;gap:5px;padding:0 12px;
  background:rgba(8,8,15,.9);border-bottom:1px solid var(--l2);
}
.dlbl{font-size:9px;color:var(--tx3);font-family:var(--mono);}
.dbtn{padding:0 8px;height:20px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid var(--l2);background:transparent;color:var(--tx2);font-family:var(--mono);white-space:nowrap;}
.dbtn:hover{border-color:var(--gold);color:var(--gold);}

/* ==============================
   四隅 プレイヤーユニット
   ============================== */
.pu{
  position:absolute;z-index:50;
  width:210px;
  padding:10px;
  display:flex;flex-direction:column;gap:7px;
}
#pu-enemy{top:40px;right:10px;}  /* 右上: 相手 */
#pu-mine{bottom:10px;right:10px;} /* 右下: 自分 */

/* パートナーカード */
.pt-wrap{
  border-radius:10px;border:2px solid var(--gold);background:rgba(10,10,22,.85);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 8px;gap:6px;cursor:pointer;
  backdrop-filter:blur(4px);
}
.pt-wrap.ready{box-shadow:0 0 14px rgba(212,168,67,.2);}
.pt-wrap.guardian{border-color:var(--red);box-shadow:0 0 14px rgba(192,57,43,.3);}
.pt-wrap.summoned{border-color:var(--l2);opacity:.5;}
.pt-art{width:72px;height:72px;border-radius:7px;background:var(--l2);border:1.5px solid rgba(212,168,67,.3);}
.pt-name{font-size:12px;font-weight:700;color:var(--gold);text-align:center;}
.pt-stat{font-size:9px;color:var(--tx2);font-family:var(--mono);text-align:center;}
.pt-skill{font-size:9px;color:var(--tx);text-align:center;line-height:1.5;padding:4px 0 2px;border-top:1px solid var(--l1);width:100%;}
.pt-cond{font-size:8px;padding:2px 6px;border-radius:3px;font-family:var(--mono);text-align:center;}
.pt-cond.unmet{background:rgba(40,40,70,.5);color:var(--tx3);border:1px solid var(--l1);}
.pt-cond.met{background:var(--gdim2);color:var(--green);border:1px solid rgba(39,174,96,.3);}
.pt-guard-badge{display:none;font-size:8px;font-weight:700;color:var(--red);font-family:var(--mono);text-align:center;}
.pt-wrap.guardian .pt-guard-badge{display:block;}
.pt-summon{width:100%;padding:5px 0;background:var(--gold);color:#000;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px;}
.pt-summon:disabled{background:var(--p3);color:var(--tx3);cursor:not-allowed;}

/* ENゲージ（パートナー下） */
.en-bar-wrap{display:flex;flex-direction:column;gap:3px;}
.en-bar-top{display:flex;align-items:center;justify-content:space-between;}
.en-lbl{font-size:8px;color:var(--tx3);font-family:var(--mono);}
.en-val{font-size:12px;font-weight:900;color:var(--gold);font-family:var(--mono);}
.en-track{height:6px;background:var(--l1);border-radius:3px;overflow:hidden;}
.en-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),#f0c860);transition:width .3s;}
.en-pips{display:flex;gap:3px;}
.ep{width:8px;height:8px;border-radius:50%;}
.ep.on{background:var(--gold);}
.ep.off{background:transparent;border:1.5px solid rgba(212,168,67,.2);}

/* デッキ・墓地 */
.side-small{display:flex;flex-direction:column;gap:4px;}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:3px 7px;background:rgba(13,13,26,.8);border:1px solid var(--l1);border-radius:4px;cursor:pointer;}
.ss-row:hover{border-color:var(--gold);}
.ss-lbl{font-size:8px;color:var(--tx3);font-family:var(--mono);}
.ss-val{font-size:12px;font-weight:700;color:var(--white);font-family:var(--mono);}
.ss-unit{font-size:8px;color:var(--tx3);font-family:var(--mono);}

/* 相手デッキ墓地: 左上 */
#info-enemy{
  position:absolute;top:40px;left:10px;z-index:50;
  width:160px;display:flex;flex-direction:column;gap:5px;padding:8px;
  background:rgba(8,8,15,.7);border-radius:8px;border:1px solid var(--l1);
}
#info-mine{
  position:absolute;bottom:10px;left:10px;z-index:50;
  width:160px;display:flex;flex-direction:column;gap:5px;padding:8px;
  background:rgba(8,8,15,.7);border-radius:8px;border:1px solid var(--l1);
}
.info-nm{font-size:10px;font-weight:700;color:var(--white);}

/* 墓地リスト（左下に重ねる） */
.grave-list{display:flex;flex-direction:column;gap:2px;max-height:80px;overflow-y:auto;}
.gi{display:flex;align-items:center;gap:4px;padding:3px 5px;border-radius:3px;background:var(--p3);border:1px solid var(--l1);cursor:pointer;flex-shrink:0;}
.gi:hover{border-color:var(--gold);}
.gi-t{font-size:7px;font-weight:700;font-family:var(--mono);padding:1px 3px;border-radius:2px;}
.gi-t.monster{background:var(--bdim);color:var(--blue);}
.gi-t.spell{background:rgba(212,130,10,.12);color:var(--orange);}
.gi-n{font-size:8px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.grave-empty{font-size:8px;color:var(--tx3);font-family:var(--mono);padding:2px 0;}

/* ==============================
   中央フィールド
   left:220px right:220px の領域
   縦: 34px(dbar) ~ 底 = 686px
   ============================== */
#field{
  position:absolute;
  left:220px;right:220px;
  top:34px;bottom:0;
  z-index:10;
  display:flex;flex-direction:column;
}

/* 相手手札 */
#e-hand-area{
  height:38px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:3px;
  padding:0 10px;
}
.hbc{width:22px;height:30px;border-radius:3px;border:1px solid var(--l2);background:var(--p3);flex-shrink:0;position:relative;overflow:hidden;}
.hbc::after{content:'';position:absolute;inset:2px;border:1px solid var(--l1);border-radius:1px;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.02) 3px,rgba(255,255,255,.02) 6px);}
.e-hand-cnt{font-size:9px;color:var(--tx3);font-family:var(--mono);margin-left:6px;}

/* 相手フィールド（Shield+Monster統合） */
#e-field{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:8px 16px;gap:6px;
  border-bottom:none;
}

/* CENTER LINE区切り */
#cbar{
  height:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(0,0,0,.5);
  border-top:1px solid var(--l2);border-bottom:1px solid var(--l2);
}
.phase-pills{display:flex;gap:4px;}
.pp{padding:3px 9px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid transparent;font-family:var(--mono);}
.pp.mon{background:var(--blue);color:#fff;}
.pp.bon{background:var(--red);color:#fff;}
.pp.off{color:var(--tx3);border-color:var(--l1);}
.turn-txt{font-size:11px;font-weight:700;color:var(--gold);font-family:var(--mono);}
.cbar-btns{display:flex;gap:6px;align-items:center;}
.btn{padding:0 12px;height:24px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;}
.btn-b{background:var(--red);color:#fff;}
.btn-b:hover{filter:brightness(1.15);}
.btn-e{background:var(--gold);color:#000;}
.btn-e:hover{filter:brightness(1.1);}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:none !important;}

/* 自分フィールド（Shield+Monster統合） */
#m-field{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:8px 16px;gap:6px;
}

/* ゾーンラベル行 */
.zone-row{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.zlbl{font-size:8px;color:var(--tx3);font-family:var(--mono);width:20px;text-align:center;}

/* Shield: 番号なし、縦横比0.75、幅=(840-20-4*5)/5=155px */
.shc{
  width:155px;height:116px;flex-shrink:0;
  border-radius:8px;border:2px solid var(--blue);background:var(--bdim);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  cursor:default;
}
.shc-art{width:42px;height:42px;border-radius:5px;border:1.5px solid var(--bbright);background:rgba(74,144,226,.15);}
.shc.broken{border-color:var(--l1);background:transparent;opacity:.12;}
.shc.broken .shc-art{opacity:0;}
.shc.atk-tgt{border-color:var(--red);background:var(--rdim);cursor:pointer;}
#eshcards,#mshcards{display:flex;gap:5px;}

/* Monster: 幅=155px、高さ=116px */
.mslot{
  width:155px;height:116px;flex-shrink:0;
  border-radius:8px;border:1.5px dashed var(--l1);
  background:rgba(255,255,255,.003);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:default;position:relative;overflow:visible;padding:6px;
}
.mslot.filled{border:2px solid var(--l2);background:var(--p3);cursor:pointer;}
.mslot.filled:hover{border-color:var(--blue);}
.mslot.summon-tgt{border-color:var(--green);background:var(--gdim2);cursor:pointer;}
.mslot.atk-ready{border-color:var(--red);background:var(--rdim);cursor:pointer;}
.mslot.atk-sel{border-color:var(--gold);background:var(--gdim);}
.mslot.atk-tgt{border-color:var(--red);background:var(--rdim);cursor:pointer;}
.mslot.front-guard{border-color:var(--green);}
.mslot.used{opacity:.38;border-color:var(--l1);}
.mart{width:54px;height:54px;border-radius:5px;background:var(--p2);border:1px solid var(--l2);}
.mnm{font-size:10px;font-weight:700;color:var(--white);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mst{display:flex;gap:3px;font-size:10px;font-weight:700;font-family:var(--mono);justify-content:center;}
.ma{color:#f09060;}.msl{color:var(--tx3);}.mh{color:#60c870;}
.kwrow{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
.kw{font-size:7px;padding:1px 4px;border-radius:2px;font-weight:700;font-family:var(--mono);}
.kw-突撃{background:rgba(220,120,30,.22);color:#f09060;border:1px solid rgba(220,120,30,.4);}
.kw-前衛{background:var(--gdim2);color:#60c870;border:1px solid rgba(39,174,96,.3);}
.lbar{width:80%;height:3px;background:var(--l1);border-radius:2px;overflow:hidden;}
.lbf{height:100%;border-radius:2px;}
.lbf.full{background:var(--green);}.lbf.half{background:var(--orange);}.lbf.low{background:var(--red);}
.ubadge{position:absolute;top:3px;right:4px;font-size:7px;color:var(--tx3);background:rgba(0,0,0,.7);padding:1px 4px;border-radius:2px;font-family:var(--mono);}
.empty-lbl{font-size:9px;color:var(--tx3);font-family:var(--mono);}
#emslots,#mmslots{display:flex;gap:5px;}

/* ==============================
   手札 — 画面最下部に扇状
   ============================== */
#hand-area{
  position:absolute;
  bottom:0;left:0;right:0;
  height:180px;
  z-index:40;
  pointer-events:none;
}
#hrow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  display:flex;align-items:flex-end;
  pointer-events:all;
  gap:0;
}
/* 手札カード: 縦長 90×128px */
.hcard{
  width:90px;height:128px;
  border-radius:8px;border:2px solid var(--l2);background:var(--p2);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  padding:6px 5px;gap:3px;
  position:relative;
  transform-origin:bottom center;
  margin:0 -6px; /* 重なり */
  transition:transform .15s,box-shadow .15s,z-index 0s;
  flex-shrink:0;
}
.hcard.playable{border-color:var(--green);}
.hcard.selected{border-color:var(--gold);box-shadow:0 0 14px rgba(212,168,67,.5);transform:translateY(-30px) !important;z-index:200 !important;}
.hcard:not(.selected):hover{z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.6);}
.hcard.no-en{opacity:.35;filter:grayscale(.5);}
.ccost{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);font-family:var(--mono);z-index:1;}
.ccost.cant{background:var(--l2);color:var(--tx3);}
.cart-h{width:100%;height:62px;border-radius:5px;background:var(--p3);border:1px solid var(--l2);flex-shrink:0;}
.ctype{font-size:7px;color:var(--tx3);font-family:var(--mono);}
.cnm{font-size:8px;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--white);}
.csub{font-size:7px;color:var(--tx3);font-family:var(--mono);}
.hcard.has-trig::after{content:'鼓動';position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:7px;color:var(--orange);font-weight:700;font-family:var(--mono);}
.hcard.spell{border-color:rgba(212,130,10,.4);}
.hcard.spell.playable{border-color:var(--green);}

/* ==============================
   フローティング カードプレビュー
   ============================== */
#float-preview{
  display:none;
  position:fixed;
  z-index:900;
  pointer-events:none;
  width:180px;
}
#fp-art{width:100%;height:160px;border-radius:8px;background:var(--p3);border:2px solid var(--l2);}
#fp-name{font-size:14px;font-weight:700;color:var(--white);margin-top:6px;text-shadow:0 1px 8px rgba(0,0,0,.8);}
#fp-type{font-size:9px;color:var(--tx3);font-family:var(--mono);}
#fp-stat{font-size:12px;font-family:var(--mono);margin-top:3px;}
#fp-kw{font-size:9px;color:#60c870;margin-top:2px;}
#fp-eff{font-size:10px;color:#8ab4ff;line-height:1.55;margin-top:4px;}
#fp-cost{font-size:9px;color:var(--gold);font-family:var(--mono);margin-top:4px;}

/* ==============================
   中央通知
   ============================== */
#notify-center{
  position:fixed;
  top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;
  pointer-events:none;
  text-align:center;
  opacity:0;transition:opacity .2s;
}
#notify-center.show{opacity:1;}
.nc-msg{font-size:20px;font-weight:900;color:var(--white);font-family:var(--mono);text-shadow:0 0 20px rgba(212,168,67,.6);}

/* 上部通知 */
#notif{position:fixed;top:34px;left:50%;transform:translateX(-50%) translateY(-100%);background:rgba(13,13,26,.95);border:1px solid var(--gold);border-top:none;border-radius:0 0 8px 8px;padding:6px 20px;font-size:12px;font-weight:700;color:var(--gold);z-index:800;transition:transform .2s;white-space:nowrap;}
#notif.show{transform:translateX(-50%) translateY(0);}

/* TRIGGER */
.ov{display:none;position:fixed;inset:0;z-index:9000;align-items:center;justify-content:center;}
.ov.show{display:flex;}
#tov{background:rgba(0,0,0,.92);flex-direction:column;align-items:center;gap:16px;cursor:pointer;}
.tov-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono);letter-spacing:.16em;}
.tov-title{font-size:5.5rem;font-weight:900;color:var(--orange);letter-spacing:.1em;}
.tov-box{width:120px;height:168px;border-radius:10px;border:2px solid var(--orange);background:rgba(212,130,10,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.tov-art{width:66px;height:66px;border-radius:6px;background:var(--p3);border:1.5px solid var(--orange);}
.tov-cnm{font-size:1.1rem;font-weight:700;color:var(--gold);}
.tov-ceff{font-size:.9rem;color:var(--tx);max-width:300px;text-align:center;}
.tov-hint{font-size:10px;color:var(--tx3);}
#cfmov{background:rgba(0,0,0,.8);display:none;position:fixed;inset:0;z-index:9000;align-items:center;justify-content:center;}
#cfmov.show{display:flex;}
.cfmbox{background:var(--p2);border:1px solid var(--l2);border-radius:10px;padding:22px;max-width:280px;text-align:center;}
.cfmmsg{font-size:12px;line-height:1.7;margin-bottom:16px;white-space:pre-wrap;}
.cfmbtns{display:flex;gap:8px;justify-content:center;}
.cfy{padding:6px 18px;background:var(--red);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.cfn{padding:6px 14px;background:transparent;color:var(--tx2);border:1px solid var(--l2);border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;}

/* 墓地モーダル */
.ov.modal-bg{background:rgba(0,0,0,.8);}
.mbox{background:var(--p2);border:1px solid var(--l2);border-radius:10px;padding:20px;max-width:380px;width:90%;max-height:70vh;overflow-y:auto;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.mttl{font-size:13px;font-weight:700;color:var(--gold);}
.mx{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;}
.mx:hover{color:var(--tx);}
.grow{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--l1);}
.grow:last-child{border-bottom:none;}
.gth{width:36px;height:50px;border-radius:4px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.gth.monster{background:var(--bdim);border:1.5px solid var(--blue);}
.gth.spell{background:rgba(212,130,10,.12);border:1.5px solid var(--orange);}
.gti{width:16px;height:16px;border-radius:3px;background:var(--l2);}
.gtl{font-size:7px;color:var(--tx3);font-family:var(--mono);}
.gn{font-size:11px;font-weight:700;color:var(--white);}
.gs{font-size:9px;color:var(--tx3);margin-top:2px;}
.ge{font-size:9px;color:#8ab4ff;margin-top:2px;line-height:1.5;}
.empty-grave{color:var(--tx3);font-size:11px;padding:10px 0;}
</style>
</head>
<body>

<!-- フローティングプレビュー -->
<div id="float-preview">
  <div id="fp-art"></div>
  <div id="fp-name"></div>
  <div id="fp-type"></div>
  <div id="fp-stat"></div>
  <div id="fp-kw"></div>
  <div id="fp-eff"></div>
  <div id="fp-cost"></div>
</div>

<!-- 中央通知 -->
<div id="notify-center"><div class="nc-msg" id="nc-msg"></div></div>

<div id="notif"></div>

<div class="ov" id="tov" onclick="hideTrig()">
  <div class="tov-lbl">Shield Trigger</div>
  <div class="tov-title">TRIGGER!</div>

<script>
const G={

      {name:'烈火の斬撃', type:'spell',cost:2,eff:'相手モンスター1体に3ダメ',trigger:true},
    ],

    shields:[true,true,true,true,true],
    shCards:[
      {name:'炎の加護',type:'spell',cost:1,eff:'ATK+3（このターン）',trigger:true},
      {name:'烈火の斬撃',type:'spell',cost:2,eff:'モンスター1体に3ダメ',trigger:true},
      {name:'灼熱突撃兵',type:'monster',cost:2,atk:3,hp:5,maxHp:5,kw:['突撃'],eff:'突撃',trigger:false},
      {name:'ファイアボール',type:'spell',cost:3,eff:'モンスター1体に5ダメ',trigger:false},
      {name:'炎獣ファング',type:'monster',cost:3,atk:4,hp:6,maxHp:6,kw:['突撃'],eff:'突撃',trigger:false},
    ],
    grave:[],
    partner:{name:'紅蓮王ヴァルド',cost:5,atk:8,hp:12,maxHp:12,skill:'突撃モンスターATK+1',condText:'1Tに2枚Shield破壊(0/2)',condMet:false,summoned:false,prog:0},
  },

    monsters:[
      {name:'水の守護者',type:'monster',cost:3,atk:2,hp:8,maxHp:8,kw:['前衛'],eff:'前衛',canAttack:false},
      {name:'霧の精霊',type:'monster',cost:2,atk:2,hp:5,maxHp:5,kw:[],eff:'破壊時:1ドロー',canAttack:false},
      null,null,null,
    ],
    shields:[true,true,true,true,true],
    shCards:[
      {name:'大波',type:'spell',cost:3,eff:'モンスター1体バウンス',trigger:true},
      {name:'水の癒し',type:'spell',cost:2,eff:'味方LIFE+5',trigger:false},
      null,null,null,
    ],
    grave:[
      {name:'水流の踊り手',type:'monster',cost:1,atk:1,hp:4,maxHp:4,eff:'召喚時:1ドロー'},
      {name:'大波',type:'spell',cost:3,eff:'モンスター1体バウンス'},
    ],
    partner:{name:'深淵王リゼル',cost:5,atk:5,hp:15,maxHp:15,skill:'ダメ受けるたび1ドロー',condText:'墓地8枚以上(現2枚)',condMet:false,summoned:false},
  },
};
const $=id=>document.getElementById(id);

/* ===== FLOATING PREVIEW ===== */
let pvTimer=null;
function pvShow(card,el){
  clearTimeout(pvTimer);
  const fp=$('float-preview');fp.style.display='block';
  $('fp-art').style.cssText=`width:100%;height:160px;border-radius:8px;background:var(--p3);border:2px solid ${card.type==='spell'?'var(--orange)':'var(--blue)'};`;
  $('fp-name').textContent=card.name;
  $('fp-name').style.cssText='font-size:14px;font-weight:700;color:var(--white);margin-top:6px;';
  $('fp-type').textContent=card.type==='spell'?'Spell'+(card.trigger?' / 鼓動':''):'Monster';
  $('fp-type').style.cssText='font-size:9px;color:var(--tx3);font-family:var(--mono);';
  if(card.atk!==undefined){
    $('fp-stat').innerHTML=`<span style="color:#f09060;font-family:var(--mono)">ATK${card.atk}</span> / <span style="color:#60c870;font-family:var(--mono)">LIFE${card.hp}</span>`;
    $('fp-stat').style.display='block';
  }else $('fp-stat').style.display='none';
  const kw=(card.kw&&card.kw.length)?card.kw.join(' / '):'';
  $('fp-kw').textContent=kw;$('fp-kw').style.display=kw?'block':'none';
  $('fp-kw').style.cssText=`font-size:9px;color:#60c870;display:${kw?'block':'none'};`;
  $('fp-eff').textContent=card.eff||'';$('fp-eff').style.display=card.eff?'block':'none';
  $('fp-eff').style.cssText=`font-size:10px;color:#8ab4ff;line-height:1.55;display:${card.eff?'block':'none'};`;
  $('fp-cost').textContent='EN '+card.cost;
  $('fp-cost').style.cssText='font-size:10px;color:var(--gold);font-family:var(--mono);';
  // 位置計算
  if(el){
    const r=el.getBoundingClientRect();
    let x=r.right+12,y=r.top;
    if(x+180>1280)x=r.left-192;
    if(y+280>720)y=720-280;
    if(y<34)y=34;
    fp.style.cssText+=`;position:fixed;left:${x}px;top:${y}px;`;
  }
}
function pvClear(){pvTimer=setTimeout(()=>{$('float-preview').style.display='none';},80);}
function pvPt(who,el){
  const gp=who==='e'?G.enemy.partner:G.my.partner;
  pvShow({name:gp.name,type:'monster',cost:gp.cost,atk:gp.atk,hp:gp.hp,kw:[],eff:'【常在】'+gp.skill+'\n【召喚条件】'+gp.condText},el);
}

/* ===== FANHAND ===== */
function applyFan(cards){
  const n=cards.length;if(!n)return;
  const maxAngle=Math.min(3*(n-1),24);
  const step=n>1?maxAngle/(n-1):0;
  const startAngle=-maxAngle/2;
  cards.forEach((c,i)=>{
    const angle=startAngle+step*i;
    const lift=Math.cos((angle/maxAngle)*Math.PI)*12;
    c.style.setProperty('--fan-rot',angle+'deg');
    c.style.setProperty('--fan-lift',lift+'px');
    c.style.transform=`rotate(${angle}deg) translateY(${-lift}px)`;
    c.style.zIndex=i;
  });
}

/* ===== NOTIFY CENTER ===== */
let ncTimer=null;
function ncShow(msg){
  clearTimeout(ncTimer);
  $('nc-msg').textContent=msg;
  $('notify-center').classList.add('show');
  ncTimer=setTimeout(()=>$('notify-center').classList.remove('show'),1200);
}

/* ===== RENDER ===== */
function ra(){
  rEN('e');rEN('m');rHB();
  rSh('e');rSh('m');rPt('e');rPt('m');
  rMon('e');rMon('m');rHand();
  rGraveSide('e');rGraveSide('m');
  rPhase();updBtn();
  $('edeckval').textContent=G.enemy.deck;
  $('mdeckval').textContent=G.my.deck;
  $('egbcnt').textContent=G.enemy.grave.length;
  $('mgbcnt').textContent=G.my.grave.length;
}
function rEN(who){
  const d=who==='e'?G.enemy:G.my;
  const pips=$(who==='e'?'eenpips':'menpips');
  const val=$(who==='e'?'eenval':'menval');
  const fill=$(who==='e'?'eenfill':'menfill');
  pips.innerHTML='';
  for(let i=0;i<Math.min(d.enMax,10);i++){
    const el=document.createElement('div');el.className='ep '+(i<d.en?'on':'off');pips.appendChild(el);
  }
  val.textContent=d.en+'/'+d.enMax;
  fill.style.width=(d.enMax>0?d.en/d.enMax*100:0)+'%';
}
function rHB(){
  const c=$('ehbcards'),cnt=$('ehbcnt');c.innerHTML='';
  for(let i=0;i<Math.min(G.enemy.handCount,14);i++){const d=document.createElement('div');d.className='hbc';c.appendChild(d);}
  cnt.textContent=G.enemy.handCount+'枚';
}
function rSh(who){
  const gd=who==='e'?G.enemy:G.my;
  const c=$(who==='e'?'eshcards':'mshcards');
  c.innerHTML='';
  gd.shields.forEach((s,i)=>{
    const el=document.createElement('div');el.className='shc'+(s?'':' broken');
    el.id=(who==='e'?'esh-':'msh-')+i;
    el.innerHTML='<div class="shc-art"></div>';
    c.appendChild(el);
  });
}
function rPt(who){
  const gp=who==='e'?G.enemy.partner:G.my.partner;
  const card=$(who==='e'?'epc':'mpc');
  $(who==='e'?'epname':'mpname').textContent=gp.name;
  $(who==='e'?'epstat':'mpstat').textContent='ATK'+gp.atk+' / LIFE'+gp.hp;
  $(who==='e'?'epskill':'mpskill').textContent='常在: '+gp.skill;
  const cd=$(who==='e'?'epcd':'mpcd');
  cd.textContent=gp.condMet?'✓ 召喚条件達成':'条件: '+gp.condText;
  cd.className='pt-cond '+(gp.condMet?'met':'unmet');
  const allBroken=(who==='e'?G.enemy:G.my).shields.every(s=>!s);
  card.className='pt-wrap';
  if(gp.summoned&&allBroken)card.classList.add('guardian');
  else if(gp.summoned)card.classList.add('summoned');
  else if(gp.condMet)card.classList.add('ready');
  if(who==='m'){
    const btn=$('mpbtn');
    if(gp.summoned){btn.textContent='召喚済';btn.disabled=true;}
    else if(gp.condMet){btn.textContent='召喚！';btn.disabled=false;}
    else{btn.textContent='召喚不可';btn.disabled=true;}
  }
}
function rMon(who){
  const row=$(who==='e'?'emslots':'mmslots');row.innerHTML='';
  const mons=who==='e'?G.enemy.monsters:G.my.monsters;
  mons.forEach((m,i)=>{
    const slot=document.createElement('div');slot.id=(who==='e'?'em-':'mm-')+i;
    if(m){
      const hp=m.hp/m.maxHp*100,hpc=hp>50?'full':hp>25?'half':'low';
      const kwh=(m.kw||[]).map(k=>`<span class="kw kw-${k}">${k}</span>`).join('');
      slot.className='mslot filled'+(m.kw&&m.kw.includes('前衛')?' front-guard':'')+(m.used?' used':'');
      slot.innerHTML=(m.used?'<div class="ubadge">攻撃済</div>':'')+
        `<div class="mart"></div>`+
        `<div class="mnm">${m.name}</div>`+
        `<div class="mst"><span class="ma">${m.atk}</span><span class="msl">/</span><span class="mh">${m.hp}</span></div>`+
        `<div class="kwrow">${kwh}</div>`+
        `<div class="lbar"><div class="lbf ${hpc}" style="width:${hp}%"></div></div>`;
      slot.addEventListener('mouseenter',()=>pvShow(m,slot));
      slot.addEventListener('mouseleave',pvClear);
      if(who==='m'&&G.phase==='battle'&&m.canAttack&&!m.used){slot.classList.add('atk-ready');slot.onclick=()=>selAtk(i);}
      else if(who==='m'&&G.phase==='main'){slot.onclick=()=>tryPlace(i);}
    }else{
      slot.className='mslot';slot.innerHTML='<span class="empty-lbl">EMPTY</span>';
      if(who==='m')slot.onclick=()=>tryPlace(i);
    }
    row.appendChild(slot);
  });
}
function rHand(){
  const row=$('hrow');row.innerHTML='';
  G.my.hand.forEach((c,i)=>{
    const ok=c.cost<=G.my.en,sel=G.selCard===i;
    const hc=document.createElement('div');
    hc.className='hcard'+(c.type==='spell'?' spell':'')+(ok?' playable':' no-en')+(sel?' selected':'')+(c.trigger?' has-trig':'');
    hc.id='hc-'+i;
    hc.innerHTML=`<div class="ccost ${ok?'':'cant'}">${c.cost}</div>`+
      `<div class="cart-h"></div>`+
      `<div class="ctype">${c.type==='spell'?'SPELL':'MONSTER'}</div>`+
      `<div class="cnm">${c.name}</div>`+
      `<div class="csub">${c.type==='monster'?`ATK${c.atk}/LIFE${c.hp}`:''}</div>`;
    hc.addEventListener('mouseenter',()=>pvShow(c,hc));
    hc.addEventListener('mouseleave',pvClear);
    if(ok)hc.onclick=()=>selCard(i);
    row.appendChild(hc);
  });
  applyFan(Array.from(row.children));
}
function rGraveSide(who){
  const isE=(who==='e');
  const grave=isE?G.enemy.grave:G.my.grave;
  const list=$(isE?'eglist-side':'mglist-side');
  list.innerHTML='';
  if(!grave.length){const e=document.createElement('span');e.className='grave-empty';e.textContent='墓地なし';list.appendChild(e);return;}
  grave.slice().reverse().forEach(card=>{
    const item=document.createElement('div');item.className='gi';
    item.innerHTML=`<span class="gi-t ${card.type}">${card.type==='spell'?'SP':'MON'}</span>`+
      `<span class="gi-n">${card.name}</span>`;
    item.addEventListener('mouseenter',()=>pvShow(card,item));
    item.addEventListener('mouseleave',pvClear);
    list.appendChild(item);
  });
}
function rPhase(){
  $('ttxt').textContent='T'+G.turn+' — '+(G.myTurn?'My Turn':'Enemy Turn');
  [['pd','draw'],['pm','main'],['pb','battle'],['pe','end']].forEach(([id,p])=>{
    const el=$(id);el.className='pp off';
    if(p==='main'&&G.phase==='main')el.classList.add('mon');
    if(p==='battle'&&G.phase==='battle')el.classList.add('bon');
  });
}
function updBtn(){
  $('btnB').disabled=!(G.myTurn&&G.phase==='main');
  $('btnE').disabled=!(G.myTurn&&(G.phase==='main'||G.phase==='battle'));
}
function selCard(i){
  if(!G.myTurn||G.phase!=='main')return;
  if(G.selCard===i){clrSel();return;}
  G.selCard=i;clrAtk();clrHL();
  const c=G.my.hand[i];
  if(c.type==='spell'){
    if(c.eff&&(c.eff.includes('1体')||c.eff.includes('1枚'))){hlEnemyTgt();ncShow(c.name+' — 対象を選択');}
    else showCfm('「'+c.name+'」を発動しますか？\n'+c.eff,()=>castSpell(i));
  }else{hlMySlots();ncShow(c.name+' — 召喚先を選択');}
  rHand();
}
function clrSel(){G.selCard=null;clrHL();rHand();}
function clrHL(){
  document.querySelectorAll('.summon-tgt').forEach(s=>s.classList.remove('summon-tgt'));
  document.querySelectorAll('.atk-tgt').forEach(s=>{s.classList.remove('atk-tgt');s.onclick=null;});
  rSh('e');
}
function hlMySlots(){G.my.monsters.forEach((m,i)=>{if(!m){const s=$('mm-'+i);if(s)s.classList.add('summon-tgt');}});}
function hlEnemyTgt(){G.enemy.monsters.forEach((m,i)=>{if(m){const s=$('em-'+i);if(s){s.classList.add('atk-tgt');s.onclick=()=>castSpellOn(G.selCard,i);}}});}
function tryPlace(si){if(G.selCard===null)return;const c=G.my.hand[G.selCard];if(!c||c.type!=='monster'||G.my.monsters[si]!==null)return;placeM(G.selCard,si);}
function placeM(hi,si){
  const c=G.my.hand[hi];if(c.cost>G.my.en){showNotif('EN不足');return;}
  G.my.en-=c.cost;G.my.monsters[si]={name:c.name,type:c.type,cost:c.cost,atk:c.atk,hp:c.hp,maxHp:c.hp,kw:c.kw||[],eff:c.eff||'',canAttack:(c.kw||[]).includes('突撃'),used:false};
  G.my.hand.splice(hi,1);G.selCard=null;clrHL();
  ncShow(c.name+' 召喚！');ra();
}
function castSpell(hi){
  const c=G.my.hand[hi];if(!c||c.cost>G.my.en)return;
  G.my.en-=c.cost;G.my.grave.push({...c});G.my.hand.splice(hi,1);G.selCard=null;clrHL();
  ncShow(c.name+' 発動');ra();
}
function castSpellOn(hi,ti){
  const c=G.my.hand[hi],t=G.enemy.monsters[ti];if(!c||!t||c.cost>G.my.en)return;
  const dmg=parseInt(c.eff.match(/\d+/)?.[0]||0);
  G.my.en-=c.cost;G.my.grave.push({...c});G.my.hand.splice(hi,1);G.selCard=null;clrHL();
  t.hp-=dmg;
  if(t.hp<=0){ncShow(c.name+' → '+t.name+' 破壊！');destroyM('e',ti);}
  else ncShow(c.name+' — -'+dmg);
  ra();
}
function goBattle(){if(!G.myTurn||G.phase!=='main')return;G.phase='battle';G.selCard=null;clrHL();ncShow('⚔ Battle Phase');ra();}
function selAtk(si){
  if(G.phase!=='battle'||!G.myTurn)return;
  const m=G.my.monsters[si];if(!m||!m.canAttack||m.used)return;
  if(G.selAtk===si){clrAtk();return;}
  G.selAtk=si;
  document.querySelectorAll('.atk-sel,.atk-tgt').forEach(s=>{s.classList.remove('atk-sel','atk-tgt');s.onclick=null;});
  const sel=$('mm-'+si);if(sel)sel.classList.add('atk-sel');
  const hasFront=G.enemy.monsters.some(m=>m&&m.kw&&m.kw.includes('前衛'));
  G.enemy.monsters.forEach((em,i)=>{if(!em)return;if(hasFront&&!(em.kw&&em.kw.includes('前衛')))return;const s=$('em-'+i);if(s){s.classList.add('atk-tgt');s.onclick=()=>doAtk(si,i);}});
  if(!hasFront){G.enemy.shields.forEach((alive,i)=>{if(alive){const s=$('esh-'+i);if(s){s.classList.add('atk-tgt');s.onclick=()=>doDirect(si,i);}}});}
  ncShow(m.name+' 攻撃宣言');
}
function clrAtk(){G.selAtk=null;document.querySelectorAll('.atk-sel,.atk-tgt').forEach(s=>{s.classList.remove('atk-sel','atk-tgt');s.onclick=null;});rSh('e');}
function doAtk(asi,dsi){
  const a=G.my.monsters[asi],d=G.enemy.monsters[dsi];if(!a||!d)return;
  clrAtk();a.used=true;d.hp-=a.atk;a.hp-=d.atk;
  if(d.hp<=0){destroyM('e',dsi);if(a.hp<=0){destroyM('m',asi);ncShow('相打ち！');}else ncShow(d.name+' 破壊！');}
  else if(a.hp<=0){destroyM('m',asi);ncShow(a.name+' 撃破された');}
  else ncShow('⚔ '+a.name+' vs '+d.name);
  if(a.eff&&a.eff.includes('攻撃時')){const dn=parseInt(a.eff.match(/\d+/)?.[0]||0);if(dn>0)brkSh('e',findAlive('e'));}
  ra();
}
function doDirect(asi,shi){
  const a=G.my.monsters[asi];if(!a)return;clrAtk();a.used=true;
  G.my.partner.prog=(G.my.partner.prog||0)+1;
  if(G.my.partner.prog>=2&&!G.my.partner.condMet){G.my.partner.condMet=true;G.my.partner.condText='達成済み';showNotif('⚡ '+G.my.partner.name+' 召喚条件達成！');}
  else if(!G.my.partner.condMet)G.my.partner.condText='1Tに2枚Shield破壊('+G.my.partner.prog+'/2)';
  brkSh('e',shi);ra();
}
function findAlive(who){const sh=who==='e'?G.enemy.shields:G.my.shields;for(let i=sh.length-1;i>=0;i--)if(sh[i])return i;return -1;}
function brkSh(who,idx){
  if(idx<0)return;const gd=who==='e'?G.enemy:G.my;gd.shields[idx]=false;
  const el=$((who==='e'?'esh-':'msh-')+idx);if(el)el.className='shc broken';
  const card=gd.shCards[idx];
  if(card){gd.grave.push({...card});if(card.trigger){showTrig(card,who);return;}
    if(who==='m'){G.my.hand.push({...card});ncShow('Shield破壊 → '+card.name+' 手札へ');}
    else{G.enemy.handCount--;ncShow('相手Shield破壊');}}
  else ncShow('Shield破壊');
  ra();
}
function showTrig(card,who){
  $('tn').textContent=card.name;$('te').textContent=card.eff||'';$('tov').classList.add('show');
  ncShow('TRIGGER: '+card.name);
  if(who==='m')G.my.hand.push({...card,trigger:false});
}
function hideTrig(){$('tov').classList.remove('show');ra();}
function destroyM(who,si){
  const mons=who==='e'?G.enemy.monsters:G.my.monsters;const m=mons[si];if(!m)return;
  (who==='e'?G.enemy:G.my).grave.push({...m});mons[si]=null;
}
function endTurn(){
  if(!G.myTurn)return;G.phase='enemy';G.myTurn=false;G.selCard=null;G.selAtk=null;clrHL();
  document.querySelectorAll('#hrow .hcard').forEach(c=>{c.style.opacity='.35';c.style.pointerEvents='none';});
  ncShow('Enemy Turn...');rPhase();updBtn();
  setTimeout(()=>{
    const ei=G.enemy.monsters.findIndex(m=>m===null);
    if(ei>=0){G.enemy.monsters[ei]={name:'波濤の剣士',type:'monster',cost:4,atk:4,hp:7,maxHp:7,kw:[],eff:'召喚時:1ドロー',canAttack:false,used:false};G.enemy.handCount--;}
    G.turn++;G.myTurn=true;G.phase='main';
    G.my.enMax=Math.min(10,G.my.enMax+1);G.my.en=G.my.enMax;
    G.enemy.enMax=Math.min(10,G.enemy.enMax+1);G.enemy.en=G.enemy.enMax;
    G.my.partner.prog=0;if(!G.my.partner.condMet)G.my.partner.condText='1Tに2枚Shield破壊(0/2)';
    G.my.monsters.forEach(m=>{if(m){m.canAttack=true;m.used=false;}});
    G.enemy.monsters.forEach(m=>{if(m)m.canAttack=false;});
    G.my.hand.push({name:'灼熱突撃兵',type:'monster',cost:2,atk:3,hp:5,maxHp:5,kw:['突撃'],eff:'突撃'});
    G.my.deck=Math.max(0,G.my.deck-1);
    document.querySelectorAll('#hrow .hcard').forEach(c=>{c.style.opacity='';c.style.pointerEvents='';});
    ncShow('T'+G.turn+' My Turn');ra();
  },1500);
}
function sumP(){
  const p=G.my.partner;if(p.summoned||!p.condMet)return;p.summoned=true;
  const ei=G.my.monsters.findIndex(m=>m===null);
  if(ei>=0)G.my.monsters[ei]={name:p.name,type:'monster',cost:p.cost,atk:p.atk,hp:p.hp,maxHp:p.maxHp,kw:[],eff:p.skill,canAttack:true,used:false,isPartner:true};
  ncShow('⚡ '+p.name+' 召喚！');ra();
}
function dBreak(){
  const idx=findAlive('e');if(idx<0){showNotif('相手Shieldがありません');return;}
  G.my.partner.prog=(G.my.partner.prog||0)+1;
  if(G.my.partner.prog>=2&&!G.my.partner.condMet){G.my.partner.condMet=true;G.my.partner.condText='達成済み';showNotif('⚡ '+G.my.partner.name+' 召喚条件達成！');}
  else if(!G.my.partner.condMet)G.my.partner.condText='1Tに2枚Shield破壊('+G.my.partner.prog+'/2)';
  brkSh('e',idx);ra();
}
function dTrig(){
  const idx=findAlive('m');if(idx<0){showNotif('自分のShieldがありません');return;}
  G.my.shCards[idx]={name:'炎の加護',type:'spell',cost:1,eff:'ATK+3（このターン）',trigger:true};
  brkSh('m',idx);
}
function dReady(){G.my.partner.condMet=true;G.my.partner.condText='達成済み';showNotif('⚡ '+G.my.partner.name+' 召喚条件達成！');ra();}
function dGuard(){
  G.my.shields=[false,false,false,false,false];G.my.partner.condMet=true;G.my.partner.condText='達成済み';
  if(!G.my.partner.summoned){G.my.partner.summoned=true;const ei=G.my.monsters.findIndex(m=>m===null);if(ei>=0)G.my.monsters[ei]={name:G.my.partner.name,type:'monster',cost:G.my.partner.cost,atk:G.my.partner.atk,hp:G.my.partner.hp,maxHp:G.my.partner.maxHp,kw:[],eff:G.my.partner.skill,canAttack:true,used:false};}
  ncShow('🛡 守護状態');ra();
}
function dMons(){
  [0,1,2].forEach((si,i)=>{if(!G.my.monsters[si])G.my.monsters[si]=[
    {name:'炎獣ファング',type:'monster',cost:3,atk:4,hp:6,maxHp:6,kw:['突撃'],eff:'突撃',canAttack:true,used:false},
    {name:'紅蓮の戦士',type:'monster',cost:5,atk:6,hp:8,maxHp:8,kw:[],eff:'攻撃時:相手2ダメ',canAttack:true,used:false},
    {name:'炎の守護者',type:'monster',cost:3,atk:3,hp:8,maxHp:8,kw:['前衛'],eff:'前衛',canAttack:true,used:false},
  ][i];});
  [2,3,4].forEach((si,i)=>{if(!G.enemy.monsters[si])G.enemy.monsters[si]=[
    {name:'深海の剣士',type:'monster',cost:4,atk:4,hp:7,maxHp:7,kw:[],eff:'召喚時:1ドロー',canAttack:false,used:false},
    {name:'氷壁の守護者',type:'monster',cost:4,atk:3,hp:10,maxHp:10,kw:['前衛'],eff:'前衛',canAttack:false,used:false},
    {name:'水流の踊り手',type:'monster',cost:1,atk:1,hp:4,maxHp:4,kw:[],eff:'召喚時:1ドロー',canAttack:false,used:false},
  ][i];});
  G.my.enMax=Math.min(10,G.my.enMax+4);G.my.en=G.my.enMax;
  ncShow('Monster追加');ra();
}
function og(who){
  const isE=(who==='e'),grave=isE?G.enemy.grave:G.my.grave;
  $(isE?'egc':'mgc').textContent='（'+grave.length+'枚）';
  const list=$(isE?'egl':'mgl');
  if(!grave.length)list.innerHTML='<div class="empty-grave">墓地にカードはありません</div>';
  else list.innerHTML=grave.map(c=>`<div class="grow"><div class="gth ${c.type}"><div class="gti"></div><div class="gtl">${c.type==='spell'?'SPELL':'MON'}</div></div><div><div class="gn">${c.name}</div><div class="gs">${c.type==='monster'?'EN'+c.cost+' ATK'+c.atk+' LIFE'+(c.maxHp||c.hp):'EN'+c.cost}</div><div class="ge">${c.eff||''}</div></div></div>`).join('');
  $(isE?'modal-eg':'modal-mg').classList.add('show');
}
function cm(id){$(id).classList.remove('show');}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))e.target.classList.remove('show');});
function showNotif(msg){const b=$('notif');b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);}
function showCfm(msg,cb){G.pendCfm=cb;$('cfmsg').textContent=msg;$('cfmov').classList.add('show');}
function cfmY(){$('cfmov').classList.remove('show');if(G.pendCfm){G.pendCfm();G.pendCfm=null;}}
function cfmN(){$('cfmov').classList.remove('show');G.pendCfm=null;clrSel();}

ncShow('T1 My Turn');ra();
</script>
</body>
</html>
